<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Portal - Sign In</title>
  
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <style>
    .login-container {
      display: flex;
      align-items: center;
      justify-content: center;
      flex: 1;
      padding: 4rem 2rem;
      position: relative;
    }
    
    /* Background light decor gradients */
    .login-decor {
      position: absolute;
      width: 300px;
      height: 300px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--color-primary), var(--color-secondary));
      opacity: 0.15;
      filter: blur(50px);
      z-index: -1;
    }
    
    .login-decor-1 { top: 15%; left: 25%; }
    .login-decor-2 { bottom: 15%; right: 25%; }
    
    .login-card {
      width: 100%;
      max-width: 440px;
      padding: 3rem;
      border-radius: var(--radius-lg);
      background: var(--bg-glass);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--border-glass);
      box-shadow: var(--shadow-glass);
      transition: var(--transition);
    }
    
    .login-card:hover {
      box-shadow: var(--shadow-lg);
    }
    
    .login-header {
      text-align: center;
      margin-bottom: 2.5rem;
    }
    
    .login-header h2 {
      font-family: var(--font-display);
      font-size: 1.8rem;
      font-weight: 800;
      margin-bottom: 0.5rem;
    }
    
    .login-header p {
      color: var(--text-secondary);
      font-size: 0.95rem;
    }
    
    .form-group {
      margin-bottom: 1.5rem;
    }
    
    .form-group label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text-secondary);
      margin-bottom: 0.5rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    
    .input-wrapper {
      position: relative;
    }
    
    .input-wrapper input {
      width: 100%;
      padding: 0.9rem 1rem 0.9rem 2.75rem;
      border-radius: var(--radius-md);
      border: 1px solid var(--border-glass);
      background: var(--bg-secondary);
      color: var(--text-primary);
      outline: none;
      font-size: 0.95rem;
      transition: var(--transition);
    }
    
    .input-wrapper input:focus {
      border-color: var(--color-primary);
      box-shadow: 0 0 0 3px rgba(var(--color-primary-rgb), 0.12);
    }
    
    .input-wrapper svg {
      position: absolute;
      left: 1rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      width: 18px;
      height: 18px;
    }
    
    .submit-btn {
      width: 100%;
      padding: 0.9rem;
      margin-top: 1rem;
      font-size: 1rem;
    }
    
    .switch-link {
      text-align: center;
      margin-top: 1.5rem;
      font-size: 0.9rem;
      color: var(--text-secondary);
    }
    
    .switch-link a {
      color: var(--color-primary);
      font-weight: 600;
    }
    
    .switch-link a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>

  <!-- Header Navigation -->
  <header>
    <div class="nav-container">
      <a href="index.html" class="logo">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75M21 12c0 1.268-.63 2.39-1.593 3.068a3.745 3.745 0 01-1.043 3.296 3.745 3.745 0 01-3.296 1.043A3.745 3.745 0 0112 21c-1.268 0-2.39-.63-3.068-1.593a3.746 3.746 0 01-3.296-1.043 3.745 3.745 0 01-1.043-3.296A3.745 3.745 0 013 12c0-1.268.63-2.39 1.593-3.068a3.745 3.745 0 011.043-3.296 3.746 3.746 0 013.296-1.043A3.746 3.746 0 0112 3c1.268 0 2.39.63 3.068 1.593a3.746 3.746 0 013.296 1.043 3.746 3.746 0 011.043 3.296A3.745 3.745 0 0121 12z" />
        </svg>
        <span>CertiVerify</span>
      </a>
      
      <div class="nav-actions">
        <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode">
          <svg class="moon-icon" fill="currentColor" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg"><path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"></path></svg>
          <svg class="sun-icon" fill="currentColor" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg"><path fill-rule="evenodd" d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4 8a4 4 0 11-8 0 4 4 0 018 0zm-.464 4.95l.707.707a1 1 0 001.414-1.414l-.707-.707a1 1 0 00-1.414 1.414zm2.12-10.607a1 1 0 010 1.414l-.706.707a1 1 0 11-1.414-1.414l.707-.707a1 1 0 011.414 0zM17 11a1 1 0 100-2h-1a1 1 0 100 2h1zm-7 4a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zM5.05 6.464A1 1 0 106.46 5.05l-.707-.707a1 1 0 00-1.414 1.414l.707.707zm1.414 8.486l-.707.707a1 1 0 01-1.414-1.414l.707-.707a1 1 0 011.414 1.414zM4 11a1 1 0 100-2H3a1 1 0 000 2h1z" clip-rule="evenodd"></path></svg>
        </button>
        <a href="index.html" class="btn btn-secondary">Verifier Portal</a>
      </div>
    </div>
  </header>

  <main class="login-container">
    <div class="login-decor login-decor-1"></div>
    <div class="login-decor login-decor-2"></div>
    
    <div class="login-card">
      <!-- Login Section -->
      <div id="loginFormSection">
        <div class="login-header">
          <h2>Welcome Back</h2>
          <p>Access your issuer dashboard panel</p>
        </div>
        <form id="loginForm">
          <div class="form-group">
            <label for="loginEmail">Email Address</label>
            <div class="input-wrapper">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" d="M21.75 6.75v10.5a2.25 2.25 0 01-2.25 2.25h-15a2.25 2.25 0 01-2.25-2.25V6.75m19.5 0A2.25 2.25 0 0019.5 4.5h-15a2.25 2.25 0 00-2.25 2.25m19.5 0v.243a2.25 2.25 0 01-1.07 1.916l-7.5 4.615a2.25 2.25 0 01-2.36 0L3.32 8.91a2.25 2.25 0 01-1.07-1.916V6.75" />
              </svg>
              <input type="email" id="loginEmail" placeholder="admin@domain.com" required>
            </div>
          </div>
          <div class="form-group">
            <label for="loginPassword">Password</label>
            <div class="input-wrapper">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" d="M16.5 10.5V6.75a4.5 4.5 0 10-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 002.25-2.25v-6.75a2.25 2.25 0 00-2.25-2.25H6.75a2.25 2.25 0 00-2.25 2.25v6.75a2.25 2.25 0 002.25 2.25z" />
              </svg>
              <input type="password" id="loginPassword" placeholder="••••••••" required>
          <button type="submit" class="btn btn-primary submit-btn">Sign In</button>
        </form>
      </div>
    </div>
  </main>

  <div class="toast-container" id="toastContainer"></div>

  <footer>
    <div class="footer-content" style="max-width: 440px;">
      <div class="footer-logo">CertiVerify Admin Portal</div>
      <div class="footer-text">&copy; 2026 CertiVerify.</div>
    </div>
  </footer>

  <script src="js/auth.js" defer></script>
  <script src="js/app.js" defer></script>
</body>
</html>
